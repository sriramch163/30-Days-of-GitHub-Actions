name: Day 29 - CI/CD with Rollback

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Build Step
        run: echo "Building application..."

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Simulate Test
        run: echo "Running tests..."

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy Step
        run: echo "Deploying application..."

      - name: Simulate Failure
        run: exit 1
        continue-on-error: true

  rollback:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
      - name: Rollback Deployment
        run: echo "Rolling back to previous stable version"