name: Day 06 - Matrix Build Workflow

on:
  push:
    branches:
      - main

jobs:
  matrix-job:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [14, 16, 18]

    steps:
      - name: Print Node Version
        run: echo "Running on Node.js version ${{ matrix.node-version }}"

      - name: Simulate Install
        run: echo "Installing dependencies for Node ${{ matrix.node-version }}"

      - name: Simulate Build
        run: echo "Building project for Node ${{ matrix.node-version }}"