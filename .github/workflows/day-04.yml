name: Day 04 - Multiple Jobs Workflow

on:
  push:
    branches:
      - main

jobs:
  job-1:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Start
        run: echo "Job 1 started"

      - name: Step 2 - Complete
        run: echo "Job 1 completed"

  job-2:
    runs-on: ubuntu-latest
    needs: job-1

    steps:
      - name: Step 1 - Start
        run: echo "Job 2 started after Job 1"

      - name: Step 2 - Complete
        run: echo "Job 2 completed"