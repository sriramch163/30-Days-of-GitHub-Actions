name: Day 18 - Job Outputs Workflow

on:
  push:
    branches:
      - main

jobs:
  job-1:
    runs-on: ubuntu-latest

    outputs:
      message: ${{ steps.set-output.outputs.message }}

    steps:
      - name: Set Output
        id: set-output
        run: echo "message=Hello from Job 1" >> $GITHUB_OUTPUT

  job-2:
    runs-on: ubuntu-latest
    needs: job-1

    steps:
      - name: Read Output from Job 1
        run: echo "Received -> ${{ needs.job-1.outputs.message }}"