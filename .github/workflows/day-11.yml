name: Day 11 - Scheduled Workflow

on:
  schedule:
    - cron: "0 0 * * *"   # Runs daily at 12:00 AM UTC
  workflow_dispatch:      # Allows manual trigger also

jobs:
  schedule-job:
    runs-on: ubuntu-latest

    steps:
      - name: Print Schedule Message
        run: echo "This workflow runs on a schedule"

      - name: Show Current Date
        run: date

      - name: Print Custom Message
        run: echo "Running scheduled task - Day 11"